name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      # macos-26 ships Xcode 26 with Swift 6.3 native — no need to
      # side-load a dev snapshot. Earlier attempts on macos-15 +
      # Swift 6.3 snapshot failed because the snapshot's frontend
      # couldn't parse the Xcode 16.4 SDK's `simd.swiftmodule`
      # swiftinterface (`__tg_exp` / `__tg_fabs` etc. — overload
      # resolution against pre-built interface).
      - name: Verify Swift version
        run: swift --version

      - name: Build release binary
        run: swift build -c release --disable-sandbox --product claudecodeirc

      - name: Ad-hoc code sign
        run: codesign --force --sign - .build/release/claudecodeirc

      - name: Tar binary
        run: tar -czf claudecodeirc-darwin-arm64.tar.gz -C .build/release claudecodeirc

      - name: Compute SHA256
        run: shasum -a 256 claudecodeirc-darwin-arm64.tar.gz

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            claudecodeirc-darwin-arm64.tar.gz \
            --title "${{ github.ref_name }}" \
            --generate-notes

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      # macos-15 ships Swift 6.1; lattice declares 6.3. Pull the
      # latest 6.3 dev snapshot — same approach as ci.yml so the
      # release binary's toolchain matches what's tested in CI.
      - name: Install Swift 6.3 toolchain
        shell: bash
        run: |
          set -eux
          BRANCH="swift-6.3-branch"
          curl -fL "https://download.swift.org/${BRANCH}/xcode/latest-build.yml" -o /tmp/latest.yml
          DIR=$(grep '^dir:' /tmp/latest.yml | awk '{print $2}')
          PKG="${DIR}-osx.pkg"
          curl -fLo /tmp/swift.pkg "https://download.swift.org/${BRANCH}/xcode/${DIR}/${PKG}"
          sudo installer -pkg /tmp/swift.pkg -target /
          echo "/Library/Developer/Toolchains/${DIR}.xctoolchain/usr/bin" >> "$GITHUB_PATH"

      - name: Verify Swift version
        run: swift --version

      - name: Build release binary
        run: swift build -c release --disable-sandbox --product claudecodeirc

      - name: Ad-hoc code sign
        run: codesign --force --sign - .build/release/claudecodeirc

      - name: Tar binary
        run: tar -czf claudecodeirc-darwin-arm64.tar.gz -C .build/release claudecodeirc

      - name: Compute SHA256
        run: shasum -a 256 claudecodeirc-darwin-arm64.tar.gz

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            claudecodeirc-darwin-arm64.tar.gz \
            --title "${{ github.ref_name }}" \
            --generate-notes

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      # macos-26's default Xcode is 26.2 (Swift 6.2.3), but the
      # runner ships several newer Xcodes alongside. Xcode 26.4.1
      # bundles Swift 6.3 — what ClaudeCodeIRC + Lattice declare —
      # so xcode-select to it instead of downloading a dev snapshot
      # every run.
      - name: Select Xcode 26.4.1 (Swift 6.3)
        run: sudo xcode-select -switch /Applications/Xcode_26.4.1.app

      - name: Verify Swift version
        run: swift --version

      - name: Build release binary
        run: swift build -c release --disable-sandbox --product claudecodeirc

      - name: Ad-hoc code sign
        run: codesign --force --sign - .build/release/claudecodeirc

      - name: Tar binary
        run: tar -czf claudecodeirc-darwin-arm64.tar.gz -C .build/release claudecodeirc

      - name: Compute SHA256
        run: shasum -a 256 claudecodeirc-darwin-arm64.tar.gz

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            claudecodeirc-darwin-arm64.tar.gz \
            --title "${{ github.ref_name }}" \
            --generate-notes

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      # macos-26's default Xcode is 26.2 (Swift 6.2.3); 26.4.1 ships
      # Swift 6.3 native — what this package declares — so xcode-
      # select to it instead of downloading a dev snapshot every run.
      - name: Select Xcode 26.4.1 (Swift 6.3)
        run: sudo xcode-select -switch /Applications/Xcode_26.4.1.app

      - name: Verify Swift version
        run: swift --version

      - name: Build
        run: swift build

      - name: Run tests
        run: swift test

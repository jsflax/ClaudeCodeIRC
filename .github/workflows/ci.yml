name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      # macos-26 ships Xcode 26 with Swift 6.3 native — no need to
      # side-load a dev snapshot. Earlier attempts on macos-15 +
      # Swift 6.3 snapshot failed because the snapshot's frontend
      # couldn't parse the Xcode 16.4 SDK's `simd.swiftmodule`
      # swiftinterface.
      - name: Verify Swift version
        run: swift --version

      - name: Build
        run: swift build

      - name: Run tests
        run: swift test

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      # macos-26's default Xcode is 26.2 (Swift 6.2.3), but the
      # runner ships several newer Xcodes alongside. Xcode 26.4.1
      # bundles Swift 6.3 — what ClaudeCodeIRC + Lattice declare —
      # so xcode-select to it instead of downloading a dev snapshot
      # every run.
      - name: Select Xcode 26.4.1 (Swift 6.3)
        run: sudo xcode-select -switch /Applications/Xcode_26.4.1.app

      - name: Verify Swift version
        run: swift --version

      # Bake the git tag into Version.current so the resulting binary
      # knows what release it is — Updater.swift compares against this
      # to decide whether to self-update at next launch.
      - name: Bake version into Version.swift
        run: |
          sed -i '' 's/public static let current = "dev"/public static let current = "${{ github.ref_name }}"/' \
            Sources/ClaudeCodeIRCCore/Util/Version.swift
          grep 'public static let current' Sources/ClaudeCodeIRCCore/Util/Version.swift

      - name: Build release binary
        run: swift build -c release --disable-sandbox --product claudecodeirc

      - name: Ad-hoc code sign
        run: codesign --force --sign - .build/release/claudecodeirc

      - name: Tar binary
        run: tar -czf claudecodeirc-darwin-arm64.tar.gz -C .build/release claudecodeirc

      # Sidecar SHA256 file uploaded alongside the tarball — Updater
      # downloads both and refuses to apply the update if the digest
      # doesn't match.
      - name: Write SHA256 sidecar
        run: shasum -a 256 claudecodeirc-darwin-arm64.tar.gz > claudecodeirc-darwin-arm64.tar.gz.sha256

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            claudecodeirc-darwin-arm64.tar.gz \
            claudecodeirc-darwin-arm64.tar.gz.sha256 \
            --title "${{ github.ref_name }}" \
            --generate-notes
